version: '3.9'

services:
  backend:
    build: .
    ports:
      - "3010:3010"
    environment:
      - PORT=3001
      - OPENCLAW_GATEWAY=${OPENCLAW_GATEWAY}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN}
      - OPENCLAW_SESSION=${OPENCLAW_SESSION}
      - TTS_VOICE=${TTS_VOICE:-en-US-BrianNeural}
      - TTS_RATE=${TTS_RATE:-+0%}
    volumes:
      - /tmp/rayconvo:/tmp/rayconvo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
