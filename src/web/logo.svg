<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="80" fill="#0a0a0a"/>

  <!-- Memphis decorative elements -->
  <!-- Scattered triangles -->
  <polygon points="80,120 100,80 60,80" fill="#ff6b00" opacity="0.9"/>
  <polygon points="440,100 460,60 420,60" fill="#ff6b00" opacity="0.6"/>
  <polygon points="60,400 80,360 40,360" fill="#ffffff" opacity="0.15"/>
  <polygon points="460,380 480,340 440,340" fill="#ffffff" opacity="0.1"/>

  <!-- Scattered dots -->
  <circle cx="100" cy="200" r="6" fill="#ff6b00" opacity="0.5"/>
  <circle cx="412" cy="180" r="8" fill="#ff6b00" opacity="0.4"/>
  <circle cx="130" cy="380" r="5" fill="#ffffff" opacity="0.2"/>
  <circle cx="380" cy="400" r="4" fill="#ffffff" opacity="0.15"/>
  <circle cx="440" cy="250" r="6" fill="#ff6b00" opacity="0.3"/>
  <circle cx="72" cy="280" r="4" fill="#ff6b00" opacity="0.4"/>

  <!-- Diagonal stripes -->
  <line x1="40" y1="450" x2="80" y2="410" stroke="#ff6b00" stroke-width="3" opacity="0.3"/>
  <line x1="50" y1="460" x2="90" y2="420" stroke="#ff6b00" stroke-width="3" opacity="0.3"/>
  <line x1="432" y1="420" x2="472" y2="460" stroke="#ffffff" stroke-width="3" opacity="0.15"/>
  <line x1="422" y1="420" x2="462" y2="460" stroke="#ffffff" stroke-width="3" opacity="0.15"/>

  <!-- Squiggle / wave line -->
  <path d="M380,130 Q400,115 420,130 Q440,145 460,130" stroke="#ff6b00" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M50,220 Q70,205 90,220 Q110,235 130,220" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.15" stroke-linecap="round"/>

  <!-- Glasses frame — main shape -->
  <!-- Left lens -->
  <rect x="115" y="195" width="110" height="85" rx="20" fill="none" stroke="#ff6b00" stroke-width="12"/>
  <!-- Right lens -->
  <rect x="287" y="195" width="110" height="85" rx="20" fill="none" stroke="#ff6b00" stroke-width="12"/>
  <!-- Bridge -->
  <path d="M225,237 Q256,220 287,237" stroke="#ff6b00" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Left temple -->
  <line x1="115" y1="237" x2="65" y2="237" stroke="#ff6b00" stroke-width="12" stroke-linecap="round"/>
  <!-- Right temple -->
  <line x1="397" y1="237" x2="447" y2="237" stroke="#ff6b00" stroke-width="12" stroke-linecap="round"/>

  <!-- Voice waves emanating from left lens — Memphis style concentric arcs -->
  <path d="M95,180 Q80,237 95,294" stroke="#ff6b00" stroke-width="5" fill="none" opacity="0.9" stroke-linecap="round"/>
  <path d="M75,165 Q52,237 75,309" stroke="#ff6b00" stroke-width="5" fill="none" opacity="0.65" stroke-linecap="round"/>
  <path d="M55,150 Q24,237 55,324" stroke="#ff6b00" stroke-width="5" fill="none" opacity="0.35" stroke-linecap="round"/>

  <!-- Voice waves from right lens -->
  <path d="M417,180 Q432,237 417,294" stroke="#ff6b00" stroke-width="5" fill="none" opacity="0.9" stroke-linecap="round"/>
  <path d="M437,165 Q460,237 437,309" stroke="#ff6b00" stroke-width="5" fill="none" opacity="0.65" stroke-linecap="round"/>
  <path d="M457,150 Q488,237 457,324" stroke="#ff6b00" stroke-width="5" fill="none" opacity="0.35" stroke-linecap="round"/>

  <!-- Sound dot accents -->
  <circle cx="40" cy="237" r="7" fill="#ff6b00" opacity="0.6"/>
  <circle cx="472" cy="237" r="7" fill="#ff6b00" opacity="0.6"/>
  <circle cx="20" cy="237" r="4" fill="#ffffff" opacity="0.2"/>
  <circle cx="492" cy="237" r="4" fill="#ffffff" opacity="0.2"/>

  <!-- Inner lens glow (small details) -->
  <rect x="128" y="208" width="84" height="60" rx="12" fill="#ff6b00" opacity="0.08"/>
  <rect x="300" y="208" width="84" height="60" rx="12" fill="#ff6b00" opacity="0.08"/>

  <!-- Memphis triangle cluster near bottom left -->
  <polygon points="90,440 110,400 70,400" fill="#ff6b00" opacity="0.25"/>
  <polygon points="110,455 130,415 90,415" fill="#ffffff" opacity="0.1"/>

  <!-- Memphis squiggle bottom right -->
  <path d="M400,450 Q420,435 440,450 Q460,465 480,450" stroke="#ff6b00" stroke-width="4" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- Plus signs as Memphis accent -->
  <line x1="200" y1="100" x2="220" y2="100" stroke="#ffffff" stroke-width="3" opacity="0.15"/>
  <line x1="210" y1="90" x2="210" y2="110" stroke="#ffffff" stroke-width="3" opacity="0.15"/>

  <line x1="340" y1="430" x2="360" y2="430" stroke="#ff6b00" stroke-width="3" opacity="0.3"/>
  <line x1="350" y1="420" x2="350" y2="440" stroke="#ff6b00" stroke-width="3" opacity="0.3"/>

  <!-- Cross / X accent -->
  <line x1="470" y1="310" x2="490" y2="330" stroke="#ffffff" stroke-width="3" opacity="0.12"/>
  <line x1="490" y1="310" x2="470" y2="330" stroke="#ffffff" stroke-width="3" opacity="0.12"/>

  <!-- "RayConvo" text at bottom -->
  <text x="256" y="478" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="52" fill="#ffffff" text-anchor="middle" letter-spacing="-1">RayConvo</text>
</svg>
